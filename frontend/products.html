<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Products | Online Sales Management System</title>

    <link rel="stylesheet" href="css/products.css">

</head>

<body>

    <!-- ================= HEADER ================= -->

    <header>

        <nav>

            <h2 class="logo">Online Sales System</h2>

            <ul>

                <li><a href="index.html">Home</a></li>

                <li><a href="products.html">Products</a></li>

                <li><a href="cart.html">Cart</a></li>

                <li><a href="checkout.html">Checkout</a></li>

                <li><a href="dashboard.html">Dashboard</a></li>

                <li><a href="login.html">Logout</a></li>

            </ul>

        </nav>

    </header>

    <!-- ================= PAGE TITLE ================= -->

    <section class="page-title">

        <h1>Available Products</h1>

        <p>

            Browse our products and add your favourite items to your shopping cart.

        </p>

    </section>

    <!-- ================= SEARCH ================= -->

    <section class="search-container">

        <input type="text" id="search" placeholder="Search product...">

        <select id="category">

            <option value="">All Categories</option>

            <option>Electronics</option>

            <option>Fashion</option>

            <option>Furniture</option>

            <option>Food</option>

        </select>

    </section>

    <!-- ================= PRODUCTS ================= -->

    <section class="products">

        <div id="product-list">

            <!-- Products loaded by products.js -->

        </div>

    </section>

    <!-- ================= FOOTER ================= -->

    <footer>

        <p>

            &copy; 2026 Online Sales Management System

        </p>

    </footer>

    <!-- ================= JAVASCRIPT ================= -->

    <script src="js/auth.js"></script>
    <script src="js/config.js"></script>

    <script src="js/products.js"></script>

</body>

</html>
