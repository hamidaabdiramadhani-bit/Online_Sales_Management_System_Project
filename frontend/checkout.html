<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Checkout | Online Sales Management System</title>

    <link rel="stylesheet" href="css/checkout.css">

</head>

<body>

    <!-- ================= HEADER ================= -->

    <header>

        <nav>

            <h2 class="logo">Online Sales System</h2>

            <ul>

                <li><a href="index.html">Home</a></li>

                <li><a href="products.html">Products</a></li>

                <li><a href="cart.html">Cart</a></li>

                <li><a href="dashboard.html">Dashboard</a></li>

                <li><a href="login.html">Logout</a></li>

            </ul>

        </nav>

    </header>

    <!-- ================= TITLE ================= -->

    <section class="page-title">

        <h1>Checkout</h1>

        <p>Complete your order below.</p>

    </section>

    <!-- ================= CHECKOUT ================= -->

    <section class="checkout-container">

        <!-- Customer Information -->

        <div class="checkout-form">

            <h2>Customer Information</h2>

            <form id="checkout-form">

                <div class="form-group">

                    <label>Customer ID</label>

                    <input type="number" id="customerId" placeholder="Enter Customer ID" required>

                </div>

                <div class="form-group">

                    <label>Full Name</label>

                    <input type="text" placeholder="Enter Full Name">

                </div>

                <div class="form-group">

                    <label>Email</label>

                    <input type="email" placeholder="Enter Email">

                </div>

                <div class="form-group">

                    <label>Phone Number</label>

                    <input type="text" placeholder="Enter Phone Number">

                </div>

                <div class="form-group">

                    <label>Delivery Address</label>

                    <textarea placeholder="Enter Delivery Address"></textarea>

                </div>

                <div class="payment-method">

                    <h3>Payment Method</h3>

                    <label>

                        <input type="radio" name="payment" checked>

                        Cash

                    </label>

                    <label>

                        <input type="radio" name="payment">

                        Mobile Money

                    </label>

                    <label>

                        <input type="radio" name="payment">

                        Bank Transfer

                    </label>

                </div>

                <button type="submit" class="place-order-btn">

                    Place Order

                </button>

                <button type="button" class="back-cart-btn" onclick="backToCart()">

                    Back To Cart

                </button>

            </form>

        </div>

        <!-- Order Summary -->

        <div class="order-summary">

            <h2>Order Summary</h2>

            <div id="order-items">

                <!-- checkout.js loads products here -->

            </div>

            <div class="summary-total">

                <span>Total</span>

                <span id="order-total">

                    TZS 0.00

                </span>

            </div>

        </div>

    </section>

    <!-- ================= FOOTER ================= -->

    <footer>

        <p>

            © 2026 Online Sales Management System

        </p>

    </footer>

    <!-- ================= JAVASCRIPT ================= -->

    <script src="js/config.js"></script>

    <script src="js/checkout.js"></script>

</body>

</html>
